name: docuflow
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.6.0
  go_router: ^17.0.0
  shared_preferences: ^2.5.3
  get: ^4.7.2
  dio: ^5.9.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.2.0
  logger: ^2.6.0
  file_picker: ^8.0.0+1
  flutter_dotenv: ^6.0.0
  fluttertoast: ^9.0.0
  shimmer_animation: ^2.2.2
  device_info_plus: ^12.2.0
  open_filex: ^4.3.4
  path_provider: ^2.1.3
  permission_handler: ^12.0.1
  focus_detector: ^2.0.1
  signature: ^6.3.0
  dropdown_search: ^6.0.0
  background_downloader: ^9.4.0
  flutter_inappwebview: ^6.1.5
  fl_chart: ^1.0.0
  device_preview: ^1.1.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  freezed: ^2.4.2
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  assets:
    - assets/images/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

  uses-material-design: true
